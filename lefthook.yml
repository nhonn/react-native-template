pre-commit:
  parallel: true
  commands:
    format:
      run: bunx @biomejs/biome format --write .
      glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.json"
        - "*.jsonc"
        - "*.css"
      stage_fixed: true
    typecheck:
      run: bun run typecheck
